<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form+Structure</title>
    <meta name="description" content="Portfolio of Kyle Stewart — graphics engineer and creative toolmaker.">
    <meta property="og:title" content="Form+Structure">
    <meta property="og:description" content="Portfolio of Kyle Stewart — graphics engineer and creative toolmaker.">
    <meta property="og:image" content="https://formandstructure.co/images/covers/neon-sprawl.jpg">
    <meta property="og:url" content="https://formandstructure.co/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="canonical" href="https://formandstructure.co/">
    <link rel="icon" href="/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @theme {
            --color-dark: #222222;
            --color-gray: #404040;
            --color-light-gray: #808080;
            --color-light: #ececec;
            --color-action: #c14d2c;
        }
        body { font-family: 'Space Mono', monospace; }
        .art { filter: drop-shadow(0 0 0.5rem #12121222); }
        .dot-matrix {
            background-image: radial-gradient(circle, #444 1px, transparent 1px);
            background-size: 16px 16px;
        }
    </style>
</head>
<body class="bg-dark text-dark antialiased">

    <!-- Header -->
    <header class="relative bg-dark overflow-hidden dot-matrix">
        <div class="relative max-w-6xl mx-auto px-8">
            <!-- Nav -->
            <nav class="flex items-center justify-between py-6">
                <a href="/" class="text-white font-bold text-lg tracking-wider">
                    <span class="hidden md:inline">FORM+STRUCTURE</span>
                    <span class="md:hidden">F+S</span>
                </a>
                <div class="flex gap-8">
                    <a href="/about" class="text-light-gray hover:text-white text-sm tracking-wider transition-colors">ABOUT</a>
                    <a href="/contact" class="text-light-gray hover:text-white text-sm tracking-wider transition-colors">CONTACT</a>
                </div>
            </nav>

            <!-- Byline -->
            <div class="pt-16 pb-6 md:pt-24 md:pb-8 flex items-end">
                <p class="text-light-gray text-sm tracking-wider">Portfolio of
                    <a href="/about" class="text-white font-bold hover:underline">Kyle Stewart</a>
                </p>
            </div>
        </div>
    </header>

    <!-- Projects -->
    <main class="bg-white">
        <section class="max-w-6xl mx-auto px-8 py-16 md:py-24">
            <div class="grid md:grid-cols-2 grid-cols-1 gap-12 md:gap-16">

                <!-- Neon Sprawl -->
                <a href="/neon-sprawl" class="group relative block overflow-hidden">
                    <img
                        src="/images/covers/neon-sprawl.jpg"
                        alt="Neon Sprawl — interactive projected installation with body tracking"
                        width="1200" height="960"
                        class="w-full transition-transform duration-300 group-hover:scale-105"
                    >
                    <div class="absolute inset-0 bg-black/0 group-hover:bg-black/60 transition-all duration-300 flex items-end p-6">
                        <div class="translate-y-4 opacity-0 group-hover:translate-y-0 group-hover:opacity-100 transition-all duration-300">
                            <h2 class="text-white text-2xl font-bold">Neon Sprawl</h2>
                            <p class="text-white/70 text-sm mt-1">Interactive Installation</p>
                        </div>
                    </div>
                </a>

                <!-- Other Fields -->
                <a href="/other-fields" class="group relative block overflow-hidden">
                    <img
                        src="/images/covers/other-fields.jpg"
                        alt="Other Fields — generative flow field print series"
                        width="1200" height="960"
                        class="w-full transition-transform duration-300 group-hover:scale-105"
                    >
                    <div class="absolute inset-0 bg-black/0 group-hover:bg-black/60 transition-all duration-300 flex items-end p-6">
                        <div class="translate-y-4 opacity-0 group-hover:translate-y-0 group-hover:opacity-100 transition-all duration-300">
                            <h2 class="text-white text-2xl font-bold">Other Fields</h2>
                            <p class="text-white/70 text-sm mt-1">Generative Art Print Series</p>
                        </div>
                    </div>
                </a>

                <!-- Shift Register -->
                <a href="/shift-register" class="group relative block overflow-hidden">
                    <img
                        src="/images/covers/shift_register.jpg"
                        alt="Shift Register — LED sculpture generating patterns of light and rhythm"
                        width="1200" height="960"
                        class="w-full transition-transform duration-300 group-hover:scale-105"
                    >
                    <div class="absolute inset-0 bg-black/0 group-hover:bg-black/60 transition-all duration-300 flex items-end p-6">
                        <div class="translate-y-4 opacity-0 group-hover:translate-y-0 group-hover:opacity-100 transition-all duration-300">
                            <h2 class="text-white text-2xl font-bold">Shift Register</h2>
                            <p class="text-white/70 text-sm mt-1">LED Sculpture</p>
                        </div>
                    </div>
                </a>

                <!-- Tetralume -->
                <a href="/tetralume" class="group relative block overflow-hidden">
                    <img
                        src="/images/covers/tetralume.jpg"
                        alt="Tetralume — LED-mapped tetrahedron light and sound performance"
                        width="1200" height="960"
                        class="w-full transition-transform duration-300 group-hover:scale-105"
                    >
                    <div class="absolute inset-0 bg-black/0 group-hover:bg-black/60 transition-all duration-300 flex items-end p-6">
                        <div class="translate-y-4 opacity-0 group-hover:translate-y-0 group-hover:opacity-100 transition-all duration-300">
                            <h2 class="text-white text-2xl font-bold">Tetralume</h2>
                            <p class="text-white/70 text-sm mt-1">LED Light & Sound Performance</p>
                        </div>
                    </div>
                </a>

            </div>
        </section>
    </main>

    <!-- Footer -->
