        @theme {
            --color-dark: #222222;
            --color-gray: #404040;
            --color-light-gray: #808080;
            --color-light: #ececec;
            --color-action: #c14d2c;
        }
        body { font-family: 'Space Mono', monospace; }

<body class="bg-white text-dark antialiased">

    <!-- Nav -->
    <nav class="bg-dark">
        <div class="max-w-6xl mx-auto px-8 flex items-center justify-between py-6">
            <a href="/" class="text-white font-bold text-lg tracking-wider">
                <span class="hidden md:inline">FORM+STRUCTURE</span>
                <span class="md:hidden">F+S</span>
            </a>
            <div class="flex gap-8">
                <a href="/about.html" class="text-light-gray hover:text-white text-sm tracking-wider transition-colors">ABOUT</a>
                <a href="/contact.html" class="text-white text-sm tracking-wider transition-colors">CONTACT</a>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <main class="max-w-xl mx-auto px-8 py-16 md:py-24">

        <div class="mb-12">
            <h1 class="text-5xl md:text-6xl font-bold mb-3">Get in Touch</h1>
            <p class="text-light-gray leading-relaxed">
                Interested in working together? Drop me a message and I'll get back to you.
            </p>
        </div>

        <form name="contact" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" action="/thanks.html">
            <!-- Honeypot -->
            <p class="hidden">
                <label>Don't fill this out: <input name="bot-field"></label>
            </p>

            <div class="mb-6">
                <label for="name" class="block text-sm font-bold mb-2">Name</label>
                <input
                    type="text"
                    id="name"
                    name="name"
                    required
                    class="w-full px-4 py-3 border border-light bg-white text-dark focus:outline-none focus:border-action transition-colors"
                >
            </div>

            <div class="mb-6">
                <label for="email" class="block text-sm font-bold mb-2">Email</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    required
                    class="w-full px-4 py-3 border border-light bg-white text-dark focus:outline-none focus:border-action transition-colors"
                >
            </div>

            <div class="mb-8">
                <label for="message" class="block text-sm font-bold mb-2">Message</label>
                <textarea
                    id="message"
                    name="message"
                    rows="6"
                    required
                    class="w-full px-4 py-3 border border-light bg-white text-dark focus:outline-none focus:border-action transition-colors resize-vertical"
                ></textarea>
            </div>

            <button
                type="submit"
                class="bg-action text-white font-bold px-8 py-3 hover:opacity-90 transition-opacity"
            >
                Send Message
            </button>
        </form>

    </main>
